<script>
document.addEventListener("DOMContentLoaded", () => {

  const params = new URLSearchParams(window.location.search);

  const nome = params.get("nome") || "Produto";
  const desc = params.get("desc") || "Sem descrição";
  const img = params.get("img") || 0;
  const preco = params.get("preco") || "70";

  document.getElementById("nome").innerText = nome;
  document.getElementById("desc").innerText = desc;
  document.getElementById("preco").innerText = "R$ " + preco;

  document.getElementById("img").src =
    "https://picsum.photos/seed/juliet" + img + "/600/400";

  const msg = `Olá! Quero comprar a ${nome} por R$ ${preco}`;

  document.getElementById("whats").href =
    "https://wa.me/5512974040166?text=" + encodeURIComponent(msg);

});
</script>
