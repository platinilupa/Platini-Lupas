<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Produto</title>

<style>
body {
  background: #0d0d0d;
  color: white;
  font-family: Arial;
  margin: 0;
  text-align: center;
}

.container {
  padding: 20px;
  max-width: 800px;
  margin: auto;
}

/* imagem */
img {
  width: 90%;
  max-width: 400px;
  border-radius: 12px;
  margin-top: 20px;
  box-shadow: 0 0 20px rgba(255,215,0,0.2);
}

/* nome */
h1 {
  margin-top: 20px;
  font-size: 28px;
}

/* descrição */
.desc {
  color: #ccc;
  font-size: 17px;
  line-height: 1.6;
}

/* preço */
.preco {
  font-size: 30px;
  color: gold;
  margin: 15px 0;
}

/* botão */
.btn {
  display: inline-block;
  padding: 12px 20px;
  background: gold;
  color: black;
  text-decoration: none;
  border-radius: 8px;
  font-weight: bold;
  margin-top: 15px;
}

/* voltar */
.voltar {
  display: block;
  margin-top: 20px;
  color: white;
  text-decoration: none;
}

/* caixas extras */
.box {
  background: #1a1a1a;
  padding: 15px;
  border-radius: 10px;
  margin-top: 20px;
  text-align: left;
}

.stars {
  color: gold;
  font-size: 18px;
}
</style>
</head>

<body>

<div class="container">

  <h1 id="nome"></h1>

  <div class="stars">⭐⭐⭐⭐⭐ (4.8/5)</div>

  <img id="img">

  <p class="preco" id="preco"></p>

  <p class="desc" id="desc"></p>

  <!-- caixa extra 1 -->
  <div class="box">
    <h3>🕶️ Detalhes do produto</h3>
    <p>• Lente resistente e confortável</p>
    <p>• Proteção UV</p>
    <p>• Estilo premium Juliet</p>
  </div>

  <!-- caixa extra 2 -->
  <div class="box">
    <h3>🚚 Entrega e garantia</h3>
    <p>• Envio rápido</p>
    <p>• Produto testado antes do envio</p>
    <p>• Garantia contra defeito</p>
  </div>

  <a id="whats" class="btn">Comprar no WhatsApp</a>

  <a class="voltar" href="index.html">⬅ Voltar</a>

</div>

<script>
const params = new URLSearchParams(window.location.search);

document.getElementById("nome").innerText = params.get("nome");
document.getElementById("desc").innerText = params.get("desc");
document.getElementById("preco").innerText = "R$ " + params.get("preco");

document.getElementById("img").src =
"https://picsum.photos/seed/juliet" + params.get("img") + "/600/400";

document.getElementById("whats").href =
"https://wa.me/5512974040166?text=" +
encodeURIComponent("Olá! Quero comprar a " + params.get("nome") + " por R$ " + params.get("preco"));
</script>

</body>
</html>
