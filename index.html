<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Platini Lupas</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(180deg, #0a0a0a, #111);
  color: white;
}

/* HEADER */
header {
  padding: 25px 20px;
  text-align: center;
  background: #000;
  border-bottom: 1px solid #222;
}

header h1 {
  margin: 0;
  font-size: 28px;
  letter-spacing: 2px;
}

header p {
  margin-top: 8px;
  color: #aaa;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
  gap: 18px;
  padding: 20px;
}

/* CARD LINK */
.card-link {
  text-decoration: none;
  color: inherit;
}

/* CARD */
.card {
  background: #161616;
  border-radius: 12px;
  overflow: hidden;
  text-align: center;
  transition: 0.25s ease;
  box-shadow: 0 0 10px rgba(0,0,0,0.4);
}

.card:hover {
  transform: translateY(-5px);
  box-shadow: 0 10px 20px rgba(255,215,0,0.08);
}

/* IMAGEM */
.card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

/* TEXTO */
.card h3 {
  margin: 10px 0 5px;
  font-size: 16px;
}

.card p {
  margin: 0 10px 10px;
  font-size: 13px;
  color: #bbb;
}

/* PREÇO */
.preco {
  color: gold;
  font-weight: bold;
  margin-bottom: 12px;
}

/* efeito leve */
.card:hover img {
  filter: brightness(1.1);
  transition: 0.3s;
}
</style>
</head>

<body>

<header>
  <h1>🕶️ PLATINI LUPAS</h1>
  <p>Escolha sua Juliet ideal</p>
</header>

<section class="grid" id="grid"></section>

<script>
const produtos = [
  {nome:"Juliet Chrome", desc:"Lente espelhada premium"},
  {nome:"Juliet Black", desc:"Estilo discreto e elegante"},
  {nome:"Juliet Gold", desc:"Visual chamativo e forte"},
  {nome:"Juliet Azul", desc:"Lente moderna azul"},
  {nome:"Juliet Vermelha", desc:"Estilo agressivo e marcante"},
  {nome:"Juliet Prata", desc:"Clássica e sofisticada"},
  {nome:"Juliet Dark", desc:"Estilo escuro premium"},
  {nome:"Juliet Ice", desc:"Visual limpo e leve"},
  {nome:"Juliet Neon", desc:"Alta visibilidade e estilo"},
  {nome:"Juliet Smoke", desc:"Lente fumê confortável"},
  {nome:"Juliet Polarizada", desc:"Proteção solar avançada"},
  {nome:"Juliet X", desc:"Modelo exclusivo"},
  {nome:"Juliet Pro", desc:"Linha premium"},
  {nome:"Juliet Street", desc:"Estilo urbano"},
  {nome:"Juliet Elite", desc:"Acabamento superior"},
  {nome:"Juliet Vision", desc:"Alta nitidez"},
  {nome:"Juliet Max", desc:"Visual robusto"},
  {nome:"Juliet Classic", desc:"Tradicional"},
  {nome:"Juliet Braba", desc:"Estilo pesado"},
  {nome:"Juliet Top", desc:"Mais vendida"}
];

const grid = document.getElementById("grid");

produtos.forEach((p, i) => {
  const preco = 80 + (i % 3) * 10;

  grid.innerHTML += `
    <a class="card-link" href="produto.html?nome=${encodeURIComponent(p.nome)}&desc=${encodeURIComponent(p.desc)}&img=${i}&preco=${preco}">
      <div class="card">
        <img src="https://picsum.photos/seed/juliet${i}/600/400">
        <h3>${p.nome}</h3>
        <p>${p.desc}</p>
        <p class="preco">R$ ${preco}</p>
      </div>
    </a>
  `;
});
</script>

</body>
</html>
