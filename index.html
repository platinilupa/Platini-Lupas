<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Platini Lupas</title>

<!-- FAVICON EMBUTIDO (NUNCA DEPENDE DE LINK) -->
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,
<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>
  <rect x='10' y='35' width='35' height='20' rx='8' fill='%232aa8ff'/>
  <rect x='55' y='35' width='35' height='20' rx='8' fill='%232aa8ff'/>
  <rect x='40' y='42' width='20' height='6' rx='3' fill='white'/>
</svg>">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0d0d0d;
  color: white;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 25px;
  background: black;
}

/* LOGO */
.logo {
  display: flex;
  align-items: center;
  gap: 10px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
  gap: 20px;
  padding: 20px;
}

/* CARD */
.card-link {
  text-decoration: none;
  color: inherit;
}

.card {
  background: #1a1a1a;
  border-radius: 10px;
  text-align: center;
  position: relative;
  overflow: hidden;
  transition: transform 0.3s ease;
}

.card:hover {
  transform: scale(1.05);
}

/* efeito */
.card::before {
  content: "";
  position: absolute;
  width: 0;
  height: 0;
  top: 50%;
  left: 50%;
  background: rgba(255, 215, 0, 0.15);
  border-radius: 50%;
  transform: translate(-50%, -50%);
  transition: width 0.4s ease, height 0.4s ease;
  z-index: 0;
  pointer-events: none;
}

.card:hover::before {
  width: 300px;
  height: 300px;
}

.card img,
.card h3,
.card p {
  position: relative;
  z-index: 2;
}

.card img {
  width: 100%;
  height: 220px;
  object-fit: cover;
  border-radius: 10px;
}

.preco {
  color: gold;
}
</style>
</head>

<body>

<header>

  <!-- LOGO -->
  <div class="logo">

    <!-- JULIET SVG -->
    <svg width="90" height="35" viewBox="0 0 140 60" fill="none">

      <rect x="5" y="15" width="55" height="30" rx="12"
        stroke="#2aa8ff" stroke-width="4"
        fill="rgba(42,168,255,0.25)"/>

      <rect x="80" y="15" width="55" height="30" rx="12"
        stroke="#2aa8ff" stroke-width="4"
        fill="rgba(42,168,255,0.25)"/>

      <rect x="60" y="25" width="20" height="6" rx="3"
        fill="#2aa8ff"/>

      <circle cx="25" cy="25" r="4" fill="white" opacity="0.8"/>
      <circle cx="110" cy="25" r="4" fill="white" opacity="0.8"/>

    </svg>

    <h1 style="
      color:white;
      font-family:Arial Black;
      font-size:20px;
      margin:0;
      letter-spacing:2px;
    ">
      PLATINI LUPAS
    </h1>

  </div>

  <p style="margin:0;color:white;font-family:Arial;">
    Escolha sua Juliet 👇
  </p>

</header>

<section class="grid" id="grid"></section>

<script>
const produtos = [
  {nome:"Juliet Chrome", desc:"Lente espelhada com acabamento premium"},
  {nome:"Juliet Black", desc:"Modelo discreto e versátil"},
  {nome:"Juliet Gold", desc:"Visual chamativo e elegante"},
  {nome:"Juliet Azul", desc:"Lente azul moderna e confortável"},
  {nome:"Juliet Vermelha", desc:"Design agressivo"},
  {nome:"Juliet Prata", desc:"Clássica e sofisticada"},
  {nome:"Juliet Dark", desc:"Estilo escuro e marcante"},
  {nome:"Juliet Ice", desc:"Visual claro e moderno"},
  {nome:"Juliet Neon", desc:"Cor vibrante"},
  {nome:"Juliet Smoke", desc:"Lente fumê confortável"},
  {nome:"Juliet Polarizada", desc:"Proteção solar"},
  {nome:"Juliet X", desc:"Modelo exclusivo"},
  {nome:"Juliet Pro", desc:"Linha avançada"},
  {nome:"Juliet Street", desc:"Estilo urbano"},
  {nome:"Juliet Elite", desc:"Acabamento premium"},
  {nome:"Juliet Vision", desc:"Alta nitidez"},
  {nome:"Juliet Max", desc:"Modelo robusto"},
  {nome:"Juliet Classic", desc:"Tradicional"},
  {nome:"Juliet Braba", desc:"Visual forte"},
  {nome:"Juliet Top", desc:"Mais vendida"}
];

const grid = document.getElementById("grid");

produtos.forEach((p, i) => {
  const preco = 70 + (i % 3) * 5;

  grid.innerHTML += `
    <a class="card-link" href="produto.html?nome=${encodeURIComponent(p.nome)}&desc=${encodeURIComponent(p.desc)}&img=${i}&preco=${preco}">
      <div class="card">
        <img src="https://picsum.photos/seed/juliet${i}/600/400">
        <h3>${p.nome}</h3>
        <p>${p.desc}</p>
        <p class="preco">R$ ${preco}</p>
      </div>
    </a>
  `;
});
</script>

</body>
</html>
