<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>DH LUPAS</title>

<link rel="icon" href="https://dummyimage.com/64x64/000/fff&text=DH">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
scroll-behavior:smooth;
}

body{
background:#0a0a0a;
color:white;
}

/* HEADER */
header{
background:black;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
position:fixed;
top:0;
width:100%;
z-index:999;
}

.logo{
font-size:18px;
letter-spacing:2px;
font-weight:bold;
}

nav a{
color:#aaa;
margin:0 8px;
font-size:13px;
text-decoration:none;
}

/* SLIDER */
.slider{
height:260px;
position:relative;
overflow:hidden;
margin-top:60px;
}

.slide{
position:absolute;
width:100%;
height:100%;
background-size:cover;
background-position:center;
opacity:0;
transition:1s;
display:flex;
align-items:center;
justify-content:center;
}

.slide h1{
background:rgba(0,0,0,0.6);
padding:15px;
border-radius:10px;
font-size:18px;
text-align:center;
}

.active{
opacity:1;
}

/* GRID MOBILE FIRST */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
padding:10px;
}

.card{
background:#141414;
border-radius:10px;
overflow:hidden;
font-size:12px;
cursor:pointer;
transition:.3s;
}

.card img{
width:100%;
height:140px;
object-fit:cover;
}

.card h3{
font-size:13px;
margin:8px;
}

.card p{
color:#aaa;
margin:0 8px 8px;
font-size:11px;
}

/* RESPONSIVO PC */
@media(min-width:768px){
.grid{
grid-template-columns:repeat(4,1fr);
padding:20px;
}

.card img{
height:190px;
}

.logo{
font-size:22px;
}
}

/* CONTATO */
#contato{
padding:30px;
text-align:center;
background:#111;
}

#contato a{
display:inline-block;
margin-top:10px;
padding:10px 15px;
background:gold;
color:black;
border-radius:8px;
text-decoration:none;
}
</style>
</head>

<body>

<header>
<div class="logo">DH LUPAS</div>

<nav>
<a href="#topo">Home</a>
<a href="#colecao">Coleção</a>
<a href="#contato">Contato</a>
</nav>
</header>

<!-- SLIDER -->
<div class="slider" id="topo">

<div class="slide active" style="background-image:url('https://picsum.photos/1200/600?1');">
<h1>Estilo urbano para o seu dia a dia</h1>
</div>

<div class="slide" style="background-image:url('https://picsum.photos/1200/600?2');">
<h1>Design moderno e presença forte</h1>
</div>

<div class="slide" style="background-image:url('https://picsum.photos/1200/600?3');">
<h1>Óculos premium DH LUPAS</h1>
</div>

</div>

<section class="grid" id="colecao"></section>

<section id="contato">
<h2 style="color:gold;">Contato</h2>
<a href="https://wa.me/5512992440819">WhatsApp</a>
</section>

<script>

/* SLIDER AUTO */
let slides = document.querySelectorAll(".slide");
let index = 0;

setInterval(()=>{
slides[index].classList.remove("active");
index = (index + 1) % slides.length;
slides[index].classList.add("active");
},3000);

/* PRODUTOS */
const produtos = [
"Juliet Chrome","Juliet Black","Juliet Gold","Juliet Azul",
"Juliet Vermelha","Juliet Prata","Juliet Dark","Juliet Ice",
"Juliet Tubágua"
];

const grid = document.getElementById("colecao");

produtos.forEach((nome,i)=>{

let imagem = "https://picsum.photos/seed/dh"+i+"/600/400";

/* 🔥 SUA IMAGEM REAL */
if(nome === "Juliet Tubágua"){
imagem = "juliet-tubagua.jpg";
}

grid.innerHTML += `
<div class="card"
onclick="window.location.href='produto.html?nome=${encodeURIComponent(nome)}&img=${i}'">

<img src="${imagem}">
<h3>${nome}</h3>
<p>Ver produto</p>

</div>
`;

});

</script>

</body>
</html>
